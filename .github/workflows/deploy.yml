name: Deploy to Hugging Face

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Install Git LFS
        run: |
          sudo apt-get install -y git-lfs
          git lfs install

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          SPACE_NAME: ${{ secrets.SPACE_NAME }}
        run: |
          # Clone the HF Space into a temp folder
          git clone https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$SPACE_NAME hf_space

          cd hf_space

          # Configure Git LFS to track binary files
          git lfs track "*.bin"
          git lfs track "*.npy"
          git lfs track "*.pt"     # optional: add others you may need later
          git lfs track "*.pkl"    # optional

          # Copy everything from your repo (excluding .git)
          rsync -av --exclude='.git' ../ ./

          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"

          git add .gitattributes
          git add .
          git commit -m "Deploy from GitHub Actions: ${{ github.sha }}" || echo "Nothing to commit"
          git push